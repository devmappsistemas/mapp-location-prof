<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket WhatsApp - Teste de Conexão</title>
    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .status-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 15px;
            border-radius: 10px;
            background: #f5f5f5;
            margin-bottom: 10px;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #dc3545;
            animation: pulse 2s infinite;
        }

        .status-indicator.connected {
            background: #28a745;
        }

        .status-indicator.connecting {
            background: #ffc107;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .status-text {
            font-weight: 600;
            color: #333;
        }

        .connection-form {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .input-group {
            flex: 1;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        input[type="text"]:disabled {
            background: #f5f5f5;
            cursor: not-allowed;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover:not(:disabled) {
            background: #c82333;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(220, 53, 69, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .messages-container {
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 15px;
            max-height: 500px;
            overflow-y: auto;
            background: #fafafa;
        }

        .messages-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e0e0e0;
        }

        .messages-header h2 {
            color: #333;
            font-size: 18px;
        }

        .clear-btn {
            padding: 6px 15px;
            background: #6c757d;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .clear-btn:hover {
            background: #5a6268;
        }

        .message-item {
            background: white;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid #e0e0e0;
        }

        .message-type {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .message-type.text {
            background: #e3f2fd;
            color: #1976d2;
        }

        .message-type.image {
            background: #f3e5f5;
            color: #7b1fa2;
        }

        .message-type.document {
            background: #fff3e0;
            color: #e65100;
        }

        .message-type.audio {
            background: #e8f5e9;
            color: #388e3c;
        }

        .message-time {
            color: #999;
            font-size: 12px;
        }

        .message-content {
            margin-top: 10px;
        }

        .message-content pre {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 6px;
            overflow-x: auto;
            font-size: 12px;
            line-height: 1.5;
        }

        .message-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            margin-top: 10px;
            font-size: 12px;
            color: #666;
        }

        .message-info-item {
            display: flex;
            flex-direction: column;
        }

        .message-info-label {
            font-weight: 600;
            color: #333;
            margin-bottom: 3px;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        .log-item {
            background: #f8f9fa;
            border-radius: 6px;
            padding: 8px 12px;
            margin-bottom: 5px;
            font-size: 12px;
            color: #666;
            border-left: 3px solid #667eea;
        }

        .log-item.error {
            border-left-color: #dc3545;
            background: #fff5f5;
            color: #721c24;
        }

        .log-item.success {
            border-left-color: #28a745;
            background: #f0fff4;
            color: #155724;
        }

        .log-item.warning {
            border-left-color: #ffc107;
            background: #fffbf0;
            color: #856404;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔌 WebSocket WhatsApp - Teste de Conexão</h1>
        
        <div class="status-bar">
            <div class="status-indicator" id="statusIndicator"></div>
            <span class="status-text" id="statusText">Desconectado</span>
            <span style="margin-left: auto; font-size: 12px; color: #999;" id="socketId"></span>
        </div>

        <div class="connection-form">
            <div class="input-group">
                <label for="identificationPhone">Identification Phone (phone_number_id)</label>
                <input 
                    type="text" 
                    id="identificationPhone" 
                    placeholder="Ex: 921213204414131"
                    value=""
                >
            </div>
            <button class="btn btn-primary" id="connectBtn" onclick="connect()">Conectar</button>
            <button class="btn btn-danger" id="disconnectBtn" onclick="disconnect()" disabled>Desconectar</button>
        </div>

        <div class="messages-container">
            <div class="messages-header">
                <h2>Mensagens Recebidas (SEND_MESSAGE)</h2>
                <button class="clear-btn" onclick="clearMessages()">Limpar</button>
            </div>
            <div id="messagesList">
                <div class="empty-state">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
                    </svg>
                    <p>Nenhuma mensagem recebida ainda</p>
                    <p style="font-size: 11px; margin-top: 5px;">Conecte-se para começar a receber mensagens</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SOCKET_URL = 'https://mapp-request.mototaxionline.srv.br';
        let socket = null;
        let reconnectAttempts = 0;
        let maxReconnectAttempts = 10;
        let reconnectDelay = 3000; // 3 segundos
        let reconnectTimer = null;
        let isManualDisconnect = false;

        const statusIndicator = document.getElementById('statusIndicator');
        const statusText = document.getElementById('statusText');
        const socketId = document.getElementById('socketId');
        const connectBtn = document.getElementById('connectBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');
        const identificationPhoneInput = document.getElementById('identificationPhone');
        const messagesList = document.getElementById('messagesList');

        function updateStatus(status, text) {
            statusIndicator.className = 'status-indicator ' + status;
            statusText.textContent = text;
        }

        function addLog(message, type = 'info') {
            const logItem = document.createElement('div');
            logItem.className = `log-item ${type}`;
            logItem.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            messagesList.appendChild(logItem);
            messagesList.scrollTop = messagesList.scrollHeight;
        }

        function addMessage(data) {
            // Remove empty state se existir
            const emptyState = messagesList.querySelector('.empty-state');
            if (emptyState) {
                emptyState.remove();
            }

            const messageItem = document.createElement('div');
            messageItem.className = 'message-item';

            const message = data.message || {};
            const messageType = message.type || 'unknown';
            const timestamp = new Date(data.timestamp || Date.now()).toLocaleString('pt-BR');

            messageItem.innerHTML = `
                <div class="message-header">
                    <span class="message-type ${messageType}">${messageType}</span>
                    <span class="message-time">${timestamp}</span>
                </div>
                <div class="message-content">
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                </div>
                <div class="message-info">
                    <div class="message-info-item">
                        <span class="message-info-label">Phone Number ID:</span>
                        <span>${data.phone_number_id || 'N/A'}</span>
                    </div>
                    <div class="message-info-item">
                        <span class="message-info-label">From:</span>
                        <span>${message.from || 'N/A'}</span>
                    </div>
                    <div class="message-info-item">
                        <span class="message-info-label">Message ID:</span>
                        <span>${message.id || 'N/A'}</span>
                    </div>
                    ${message.text ? `
                    <div class="message-info-item">
                        <span class="message-info-label">Texto:</span>
                        <span>${message.text.body || 'N/A'}</span>
                    </div>
                    ` : ''}
                    ${message.document ? `
                    <div class="message-info-item">
                        <span class="message-info-label">Documento:</span>
                        <span>${message.document.filename || 'N/A'}</span>
                    </div>
                    ` : ''}
                    ${message.image ? `
                    <div class="message-info-item">
                        <span class="message-info-label">Imagem ID:</span>
                        <span>${message.image.id || 'N/A'}</span>
                    </div>
                    ` : ''}
                    ${message.audio ? `
                    <div class="message-info-item">
                        <span class="message-info-label">Áudio ID:</span>
                        <span>${message.audio.id || 'N/A'}</span>
                    </div>
                    ` : ''}
                </div>
            `;

            messagesList.appendChild(messageItem);
            messagesList.scrollTop = messagesList.scrollHeight;
        }

        function clearMessages() {
            messagesList.innerHTML = `
                <div class="empty-state">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
                    </svg>
                    <p>Nenhuma mensagem recebida ainda</p>
                    <p style="font-size: 11px; margin-top: 5px;">Conecte-se para começar a receber mensagens</p>
                </div>
            `;
        }

        function connect() {
            const identificationPhone = identificationPhoneInput.value.trim();
            
            if (!identificationPhone) {
                alert('Por favor, informe o Identification Phone');
                identificationPhoneInput.focus();
                return;
            }

            // Se já existe uma conexão, desconecta antes de criar uma nova
            if (socket) {
                addLog('Desconectando conexão anterior...', 'info');
                isManualDisconnect = true; // Marca como desconexão manual para não tentar reconectar
                
                // Remove todos os listeners para evitar conflitos
                socket.removeAllListeners();
                
                // Desconecta a conexão existente
                socket.disconnect();
                socket = null;
                
                // Limpa timer de reconexão se existir
                if (reconnectTimer) {
                    clearTimeout(reconnectTimer);
                    reconnectTimer = null;
                }
                
                // Pequeno delay para garantir que a desconexão foi processada
                setTimeout(() => {
                    createNewConnection(identificationPhone);
                }, 100);
                return;
            }

            createNewConnection(identificationPhone);
        }

        function createNewConnection(identificationPhone) {
            isManualDisconnect = false;
            reconnectAttempts = 0;

            updateStatus('connecting', 'Conectando...');
            connectBtn.disabled = true;
            identificationPhoneInput.disabled = true;
            addLog(`Conectando ao servidor: ${SOCKET_URL}`, 'info');
            addLog(`Identification Phone: ${identificationPhone}`, 'info');

            socket = io(SOCKET_URL, {
                transports: ['websocket'],
                query: {
                    identificationPhone: identificationPhone
                },
                reconnection: false // Vamos controlar a reconexão manualmente
            });

            socket.on('connect', () => {
                reconnectAttempts = 0;
                updateStatus('connected', 'Conectado');
                socketId.textContent = `Socket ID: ${socket.id}`;
                connectBtn.disabled = true;
                disconnectBtn.disabled = false;
                addLog('Conectado com sucesso!', 'success');
            });

            socket.on('disconnect', (reason) => {
                updateStatus('', 'Desconectado');
                socketId.textContent = '';
                connectBtn.disabled = false;
                disconnectBtn.disabled = true;
                identificationPhoneInput.disabled = false;
                
                if (reason === 'io server disconnect') {
                    addLog('Desconectado pelo servidor', 'error');
                } else if (reason === 'io client disconnect') {
                    addLog('Desconectado pelo cliente', 'info');
                } else {
                    addLog(`Desconectado: ${reason}`, 'warning');
                }

                // Tenta reconectar automaticamente se não foi desconexão manual
                if (!isManualDisconnect) {
                    attemptReconnect();
                }
            });

            socket.on('connect_error', (error) => {
                updateStatus('', 'Erro de Conexão');
                addLog(`Erro ao conectar: ${error.message}`, 'error');
                connectBtn.disabled = false;
                identificationPhoneInput.disabled = false;
                
                if (!isManualDisconnect) {
                    attemptReconnect();
                }
            });

            socket.on('SEND_MESSAGE', (data) => {
                addLog('Mensagem recebida!', 'success');
                addMessage(data);
            });

            socket.on('error', (error) => {
                addLog(`Erro no socket: ${error}`, 'error');
            });
        }

        function disconnect() {
            isManualDisconnect = true;
            
            if (reconnectTimer) {
                clearTimeout(reconnectTimer);
                reconnectTimer = null;
            }

            if (socket) {
                socket.disconnect();
                socket = null;
            }

            updateStatus('', 'Desconectado');
            socketId.textContent = '';
            connectBtn.disabled = false;
            disconnectBtn.disabled = true;
            identificationPhoneInput.disabled = false;
            addLog('Desconectado manualmente', 'info');
        }

        function attemptReconnect() {
            if (isManualDisconnect || reconnectAttempts >= maxReconnectAttempts) {
                if (reconnectAttempts >= maxReconnectAttempts) {
                    addLog(`Limite de tentativas de reconexão atingido (${maxReconnectAttempts})`, 'error');
                    updateStatus('', 'Falha na Conexão');
                    connectBtn.disabled = false;
                    identificationPhoneInput.disabled = false;
                }
                return;
            }

            reconnectAttempts++;
            const delay = reconnectDelay * reconnectAttempts; // Backoff exponencial
            
            updateStatus('connecting', `Reconectando... (${reconnectAttempts}/${maxReconnectAttempts})`);
            addLog(`Tentativa de reconexão ${reconnectAttempts}/${maxReconnectAttempts} em ${delay/1000}s...`, 'warning');

            reconnectTimer = setTimeout(() => {
                const identificationPhone = identificationPhoneInput.value.trim();
                if (identificationPhone) {
                    connect();
                }
            }, delay);
        }

        // Permite conectar pressionando Enter no input
        identificationPhoneInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !connectBtn.disabled) {
                connect();
            }
        });

        // Limpa timers ao fechar a página
        window.addEventListener('beforeunload', () => {
            isManualDisconnect = true;
            if (socket) {
                socket.disconnect();
            }
            if (reconnectTimer) {
                clearTimeout(reconnectTimer);
            }
        });
    </script>
</body>
</html>
